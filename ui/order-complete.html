<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>키오스크 - 주문 완료</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="css/design-system.css">
</head>
<body>
<svg style="display:none">
<symbol id="i-check" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></symbol>
</svg>
<div class="note">POST /api/orders 응답 (order_number 101부터 시작)</div>
<div class="kiosk">
    <header class="kiosk-header">
        <span class="side"></span>
        <span class="title">주문 완료</span>
        <span class="side right"></span>
    </header>

    <main class="kiosk-body">
        <div class="center-block">
            <div class="circle"><svg class="icon"><use href="#i-check"/></svg></div>
            <div class="headline">주문이 완료되었습니다</div>
            <div class="subline">화면의 번호가 호출되면 카운터에서 수령해주세요</div>

            <div class="order-number-box">
                <div class="label">주문 번호</div>
                <div class="number">228</div>
            </div>

            <div class="receipt">
                <div class="row"><span>와퍼 세트 x1</span><span class="value">9,900원</span></div>
                <div class="row"><span>치즈와퍼 x2</span><span class="value">15,600원</span></div>
                <div class="row"><span>콜라 x1</span><span class="value">2,200원</span></div>
                <div class="row total"><span>총 결제금액</span><span class="value">27,700원</span></div>
            </div>
        </div>
    </main>

    <div class="bottom-bar">
        <a class="btn-primary btn-xl" style="flex:1;" href="index.html">처음 화면으로</a>
    </div>
</div>
</body>
</html>
