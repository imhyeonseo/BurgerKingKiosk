<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>키오스크 - 메뉴 상세</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="css/design-system.css">
</head>
<body>
<svg style="display:none">
<symbol id="i-cart" viewBox="0 0 24 24"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 2-1.58l1.65-7.42H5.12"/></symbol>
<symbol id="i-arrow-left" viewBox="0 0 24 24"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></symbol>
<symbol id="i-utensils" viewBox="0 0 24 24"><path d="M3 3v7c0 1.1.9 2 2 2h2a2 2 0 0 0 2-2V3"/><path d="M5 12v9"/><path d="M19 3c-1.1 0-2 1.3-2 3v4c0 1.1.9 2 2 2s2-.9 2-2V6c0-1.7-.9-3-2-3Z"/><path d="M19 12v9"/></symbol>
<symbol id="i-minus" viewBox="0 0 24 24"><path d="M5 12h14"/></symbol>
<symbol id="i-plus" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5v14"/></symbol>
</svg>
<div class="note">GET /api/menus/{menuId} &nbsp;/&nbsp; POST /api/carts/items</div>
<div class="kiosk">
    <header class="kiosk-header">
        <a class="side" href="index.html"><svg class="icon icon-24"><use href="#i-arrow-left"/></svg></a>
        <span class="title">메뉴 상세</span>
        <a class="side right" href="cart.html"><svg class="icon icon-24"><use href="#i-cart"/></svg></a>
    </header>

    <main class="kiosk-body">
        <div class="placeholder detail-hero"><svg class="icon"><use href="#i-utensils"/></svg></div>
        <div class="detail-title">와퍼 세트</div>
        <div class="detail-price">9,900원</div>
        <div class="detail-desc">와퍼 + 어니언링 + 콜라로 구성된 세트 메뉴입니다.</div>

        <div class="section-label">세트 구성</div>
        <div class="list-box">
            <div class="row"><span>와퍼</span><span>x1</span></div>
            <div class="row"><span>어니언링</span><span>x1</span></div>
            <div class="row"><span>콜라</span><span>x1</span></div>
        </div>

        <div class="section-label">수량</div>
        <div class="qty-row">
            <button aria-label="수량 감소"><svg class="icon icon-16"><use href="#i-minus"/></svg></button>
            <span class="qty">1</span>
            <button aria-label="수량 증가"><svg class="icon icon-16"><use href="#i-plus"/></svg></button>
        </div>
    </main>

    <div class="bottom-bar">
        <button class="btn-primary btn-xl" style="flex:1;">담기 - 9,900원</button>
    </div>
</div>
</body>
</html>
