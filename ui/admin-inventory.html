<div class="admin">

        <div class="brand"><svg class="icon"><use href="#i-utensils"/></svg>BURGER KIOSK</div>

            <div class="group-label">메뉴 관리</div>
            <a href="admin-categories.html"><svg class="icon"><use href="#i-folder"/></svg>카테고리</a>

            <a href="admin-orders.html"><svg class="icon"><use href="#i-receipt"/></svg>주문</a>

            <a href="admin-login.html"><svg class="icon"><use href="#i-logout"/></svg>로그아웃</a>
        </nav>
    </aside>

    <main class="admin-main">
        <div class="admin-topbar">
            <div>
                <h1>재고 관리</h1>
                <div class="subtitle">재고 수량은 이 화면에서만 변경 (메뉴 수정 API와 분리)</div>
            </div>
            <div class="admin-user"><div class="avatar">A</div>admin</div>
        </div>

        <div class="panel">
            <div class="panel-header"><h2>재고 현황</h2></div>
            <div class="panel-body">
                <div class="toolbar">
                    <select class="field-input"><option>전체</option><option>품절만</option><option>판매 가능만</option></select>
                    <div class="spacer"></div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th class="col-text">메뉴명</th>
                            <th class="col-text">카테고리</th>
                            <th class="col-amount">현재 재고</th>
                            <th class="col-status">상태</th>
                            <th class="col-actions">수정</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="col-text">와퍼</td><td class="col-text">버거</td><td class="col-amount">98</td>
                            <td class="col-status"><span class="badge badge-success"><svg class="icon-16"><use href="#i-check"/></svg>판매 가능</span></td>
                            <td class="col-actions">
                                <div class="actions-right">
                                    <input class="field-input" type="number" value="98" style="width:80px;">
                                    <button class="btn-primary btn-sm">저장</button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="col-text">치즈와퍼</td><td class="col-text">버거</td><td class="col-amount">40</td>
                            <td class="col-status"><span class="badge badge-success"><svg class="icon-16"><use href="#i-check"/></svg>판매 가능</span></td>
                            <td class="col-actions">
                                <div class="actions-right">
                                    <input class="field-input" type="number" value="40" style="width:80px;">
                                    <button class="btn-primary btn-sm">저장</button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="col-text">불고기버거</td><td class="col-text">버거</td><td class="col-amount">0</td>
                            <td class="col-status"><span class="badge badge-warning"><svg class="icon-16"><use href="#i-alert"/></svg>품절</span></td>
                            <td class="col-actions">
                                <div class="actions-right">
                                    <input class="field-input" type="number" value="0" style="width:80px;">
                                    <button class="btn-primary btn-sm">저장</button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="col-text">어니언링</td><td class="col-text">사이드</td><td class="col-amount">120</td>
                            <td class="col-status"><span class="badge badge-success"><svg class="icon-16"><use href="#i-check"/></svg>판매 가능</span></td>
                            <td class="col-actions">
                                <div class="actions-right">
                                    <input class="field-input" type="number" value="120" style="width:80px;">
                                    <button class="btn-primary btn-sm">저장</button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="col-text">콜라</td><td class="col-text">음료</td><td class="col-amount">3</td>
                            <td class="col-status"><span class="badge badge-success"><svg class="icon-16"><use href="#i-check"/></svg>판매 가능</span></td>
                            <td class="col-actions">
                                <div class="actions-right">
                                    <input class="field-input" type="number" value="3" style="width:80px;">
                                    <button class="btn-primary btn-sm">저장</button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div class="pagination">
                    <button class="active">1</button>
                    <button>2</button>
                </div>
            </div>
        </div>
    </main>
</div>

</html>
