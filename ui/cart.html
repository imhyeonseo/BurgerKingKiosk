<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>키오스크 - 장바구니</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="css/design-system.css">
</head>
<body>
<svg style="display:none">
<symbol id="i-arrow-left" viewBox="0 0 24 24"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></symbol>
<symbol id="i-utensils" viewBox="0 0 24 24"><path d="M3 3v7c0 1.1.9 2 2 2h2a2 2 0 0 0 2-2V3"/><path d="M5 12v9"/><path d="M19 3c-1.1 0-2 1.3-2 3v4c0 1.1.9 2 2 2s2-.9 2-2V6c0-1.7-.9-3-2-3Z"/><path d="M19 12v9"/></symbol>
<symbol id="i-minus" viewBox="0 0 24 24"><path d="M5 12h14"/></symbol>
<symbol id="i-plus" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5v14"/></symbol>
<symbol id="i-x" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></symbol>
<symbol id="i-trash" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></symbol>
</svg>
<div class="note">GET /api/carts &nbsp;/&nbsp; PATCH·DELETE /api/carts/items/{id} &nbsp;/&nbsp; POST /api/orders</div>
<div class="kiosk">
    <header class="kiosk-header">
        <a class="side" href="index.html"><svg class="icon icon-24"><use href="#i-arrow-left"/></svg></a>
        <span class="title">장바구니</span>
        <span class="side right"></span>
    </header>

    <main class="kiosk-body">
        <div class="cart-item">
            <div class="placeholder"><svg class="icon"><use href="#i-utensils"/></svg></div>
            <div class="meta">
                <div class="top-row"><span class="name">와퍼 세트</span><span class="price">9,900원</span></div>
                <div class="bottom-row">
                    <div class="qty-row sm">
                        <button aria-label="수량 감소"><svg class="icon icon-16"><use href="#i-minus"/></svg></button>
                        <span class="qty">1</span>
                        <button aria-label="수량 증가"><svg class="icon icon-16"><use href="#i-plus"/></svg></button>
                    </div>
                    <a class="remove" href="#"><svg class="icon icon-16"><use href="#i-x"/></svg>빼기</a>
                </div>
            </div>
        </div>

        <div class="cart-item">
            <div class="placeholder"><svg class="icon"><use href="#i-utensils"/></svg></div>
            <div class="meta">
                <div class="top-row"><span class="name">치즈와퍼</span><span class="price">15,600원</span></div>
                <div class="bottom-row">
                    <div class="qty-row sm">
                        <button aria-label="수량 감소"><svg class="icon icon-16"><use href="#i-minus"/></svg></button>
                        <span class="qty">2</span>
                        <button aria-label="수량 증가"><svg class="icon icon-16"><use href="#i-plus"/></svg></button>
                    </div>
                    <a class="remove" href="#"><svg class="icon icon-16"><use href="#i-x"/></svg>빼기</a>
                </div>
            </div>
        </div>

        <div class="cart-item" style="border-bottom:none;">
            <div class="placeholder"><svg class="icon"><use href="#i-utensils"/></svg></div>
            <div class="meta">
                <div class="top-row"><span class="name">콜라</span><span class="price">2,200원</span></div>
                <div class="bottom-row">
                    <div class="qty-row sm">
                        <button aria-label="수량 감소"><svg class="icon icon-16"><use href="#i-minus"/></svg></button>
                        <span class="qty">1</span>
                        <button aria-label="수량 증가"><svg class="icon icon-16"><use href="#i-plus"/></svg></button>
                    </div>
                    <a class="remove" href="#"><svg class="icon icon-16"><use href="#i-x"/></svg>빼기</a>
                </div>
            </div>
        </div>

        <div class="summary">
            <div class="row"><span>상품 수</span><span class="value">3종 / 4개</span></div>
            <div class="row total"><span>총 결제금액</span><span class="value">27,700원</span></div>
        </div>

        <div class="center-link"><a href="#"><svg class="icon icon-16"><use href="#i-trash"/></svg>장바구니 비우기</a></div>
    </main>

    <div class="bottom-bar">
        <a class="btn-secondary btn-xl" href="index.html">계속 담기</a>
        <a class="btn-primary btn-xl" href="order-complete.html">주문하기 - 27,700원</a>
    </div>
</div>
</body>
</html>
