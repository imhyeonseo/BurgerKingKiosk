<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>키오스크 - 메뉴</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="css/design-system.css">
</head>
<body>
<svg style="display:none">
<symbol id="i-cart" viewBox="0 0 24 24"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 2-1.58l1.65-7.42H5.12"/></symbol>
<symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></symbol>
<symbol id="i-utensils" viewBox="0 0 24 24"><path d="M3 3v7c0 1.1.9 2 2 2h2a2 2 0 0 0 2-2V3"/><path d="M5 12v9"/><path d="M19 3c-1.1 0-2 1.3-2 3v4c0 1.1.9 2 2 2s2-.9 2-2V6c0-1.7-.9-3-2-3Z"/><path d="M19 12v9"/></symbol>
<symbol id="i-alert" viewBox="0 0 24 24"><path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></symbol>
</svg>
<div class="note">GET /api/categories &nbsp;/&nbsp; GET /api/categories/{id}/menus</div>
<div class="kiosk">
    <header class="kiosk-header">
        <span class="side title">BURGER KIOSK</span>
        <a class="side right" href="cart.html">
            <svg class="icon icon-24"><use href="#i-cart"/></svg>
            <span class="cart-count">3</span>
        </a>
    </header>

    <nav class="tabs">
        <a class="tab active" href="index.html">버거</a>
        <a class="tab" href="#">사이드</a>
        <a class="tab" href="#">음료</a>
    </nav>

    <main class="kiosk-body">
        <div class="section-label">버거</div>
        <div class="menu-grid">
            <a class="menu-card" href="menu-detail.html">
                <div class="placeholder"><svg class="icon"><use href="#i-utensils"/></svg></div>
                <div class="info">
                    <div class="tag-row"><span></span><span></span></div>
                    <div class="name">와퍼</div>
                    <div class="price">7,100원</div>
                </div>
            </a>

            <a class="menu-card" href="menu-detail.html">
                <div class="placeholder"><svg class="icon"><use href="#i-utensils"/></svg></div>
                <div class="info">
                    <div class="tag-row"><span></span><span></span></div>
                    <div class="name">치즈와퍼</div>
                    <div class="price">7,800원</div>
                </div>
            </a>

            <a class="menu-card is-sold-out" href="#">
                <div class="placeholder"><svg class="icon"><use href="#i-utensils"/></svg></div>
                <div class="info">
                    <div class="tag-row">
                        <span class="badge badge-warning"><svg class="icon-16"><use href="#i-alert"/></svg>품절</span>
                        <span></span>
                    </div>
                    <div class="name">불고기버거</div>
                    <div class="price">4,500원</div>
                </div>
            </a>

            <a class="menu-card" href="#">
                <div class="placeholder"><svg class="icon"><use href="#i-utensils"/></svg></div>
                <div class="info">
                    <div class="tag-row">
                        <span></span>
                        <span class="badge badge-secondary">SET</span>
                    </div>
                    <div class="name">와퍼 세트</div>
                    <div class="price">9,900원</div>
                </div>
            </a>

            <a class="menu-card" href="#">
                <div class="placeholder"><svg class="icon"><use href="#i-utensils"/></svg></div>
                <div class="info">
                    <div class="tag-row">
                        <span></span>
                        <span class="badge badge-secondary">SET</span>
                    </div>
                    <div class="name">치즈와퍼 세트</div>
                    <div class="price">10,600원</div>
                </div>
            </a>
        </div>
    </main>

    <div class="bottom-bar">
        <a class="btn-secondary btn-xl"><svg class="icon"><use href="#i-search"/></svg>메뉴 검색</a>
        <a class="btn-primary btn-xl" href="cart.html">장바구니 보기 (3)</a>
    </div>
</div>
</body>
</html>
